
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexatombe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar">
        <img src="logo.png" alt="Logo" class="logo">
    </header>

    <section class="hero">

        <div class="overlay"></div>

        <div class="personagens">
            <img src="p1.png" class="personagem" data-id="1">
            <img src="p2.png" class="personagem" data-id="2">
            <img src="p3.png" class="personagem" data-id="3">
            <img src="p4.png" class="personagem" data-id="4">
            <img src="p5.png" class="personagem" data-id="5">
            <img src="p6.png" class="personagem" data-id="6">
        </div>

    </section>

    <div id="fichaModal" class="ficha-modal">
        <div class="ficha-box">

            <div class="ficha-header">
                <span class="fechar">×</span>
            </div>

            <div class="ficha-corpo">

                <img id="fichaImagem" class="foto-personagem" src="">

                <div class="info-ficha">

                    <h1 id="fichaNome"></h1>

                    <p><strong>Idade:</strong> <span id="fichaIdade"></span></p>
                    <p><strong>Classe:</strong> <span id="fichaClasse"></span></p>
                    <p><strong>NEX:</strong> <span id="fichaNex"></span></p>

                    <div class="link-ficha" onclick="toggleSecao('atributosSecao')">Atributos >></div>
                    <div id="atributosSecao" class="conteudo-toggle">
                        <img id="fichaAtributosImg" class="atributos-img" src="">
                    </div>

                    <div class="link-ficha" onclick="toggleSecao('periciasSecao')">Perícias >></div>
                    <div id="periciasSecao" class="conteudo-toggle">
                        <ul id="fichaPericias"></ul>
                    </div>

                    <div class="link-ficha" onclick="toggleSecao('armasSecao')">Armas >></div>
                    <div id="armasSecao" class="conteudo-toggle">
                        <div id="fichaArmas"></div>
                    </div>

                    <div class="link-ficha" onclick="toggleSecao('rituaisSecao')">Rituais >></div>
                    <div id="rituaisSecao" class="conteudo-toggle">
                        <ul id="fichaRituais"></ul>
                    </div>

                </div>

            </div>

        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
